<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Social Risk Scanner</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        min-width: 260px;
        padding: 16px;
        background: #f4f7fb;
        color: #15233c;
      }

      h3 {
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 12px;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 10px 12px;
        background: linear-gradient(135deg, #2563eb, #0f766e);
        color: white;
        cursor: pointer;
      }

      #status {
        margin-top: 10px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h3>Social Risk Scanner</h3>
    <p>Scan the current Facebook page and send high-risk posts to the local analysis server.</p>
    <button id="scrape">Scan now</button>
    <div id="status">Ready.</div>
    <script src="popup.js"></script>
  </body>
</html>
